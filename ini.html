</head>
<body>

<!-- ── HEADER ── -->

<div class="header">
<div class="header-top">
<div>
<div class="round-badge">RUNDE <span class="round-num" id="round-num">1</span></div>
</div>
<div class="group-tabs" id="group-tabs">
<button class="group-tab active" data-g="1" onclick="switchGroup(1)">GRP 1</button>
<button class="group-tab" data-g="2" onclick="switchGroup(2)">GRP 2</button>
<button class="group-tab" data-g="3" onclick="switchGroup(3)">GRP 3</button>
</div>
</div>
<div class="input-grid">
<input class="inp" id="in-name" type="text" placeholder="Name" autocomplete="off">
<input class="inp" id="in-ini" type="number" placeholder="Ini">
<button class="btn-add" id="btn-add" onclick="addChar()">＋</button>
</div>
<label class="hero-toggle">
<input type="checkbox" id="in-hero"> Held (gruppenübergreifend)
</label>
</div>

<!-- ── LIST ── -->

<div id="char-list"></div>

<!-- ── FOOTER ── -->

<div class="footer">
<div class="eff-row" style="grid-template-columns: 1fr 1fr 60px 44px;">
<input class="inp" id="eff-name" list="eff-list" placeholder="Effekt" autocomplete="off" style="font-size:13px;">
<datalist id="eff-list">
<option value="Segen"><option value="Hast"><option value="Gift"><option value="Erschöpft">
<option value="Gesegnet"><option value="Blind"><option value="Betäubt"><option value="Verlangsamt">
<option value="Schutz vor Bösem"><option value="Schutz vor Gutem">
</datalist>
<select class="inp" id="eff-target" style="font-size:13px;"></select>
<input class="inp" id="eff-dur" type="number" placeholder="Rnd">
<button class="btn-eff" onclick="addEffect()">＋</button>
</div>
<div class="nav-row">
<button class="btn-nav btn-next" onclick="finishTurn()">ZUG BEENDEN</button>
<button class="btn-nav btn-wait" onclick="waitTurn()">ABWARTEN</button>
<button class="btn-nav btn-reset" onclick="confirmReset()">NEUE<br>RUNDE</button>
<button class="btn-nav btn-end" onclick="confirmEndCombat()">KAMPF<br>ENDE</button>
</div>
</div>

<!-- ── ROUND END BANNER ── -->

<div class="round-end" id="round-end">
<h2>RUNDE BEENDET</h2>
<p id="round-summary"></p>
<button onclick="nextRound()">NEUE RUNDE →</button>
</div>

<script>
let chars = [];
let currentGroup = 1;
let currentActiveId = null;
let roundNumber = 1;
let idCounter = 1;

// ─── SORTABLE ───
const listEl = document.getElementById('char-list');
Sortable.create(listEl, {
animation: 150,
handle: '.char-row',
onEnd: () => {
const rows = Array.from(listEl.querySelectorAll('.char-row'));
const newOrder = rows.map(r => chars.find(c => c.id == r.dataset.id)).filter(Boolean);
// Rebuild chars: keep chars not in visible set, splice visible ones in order
const visibleIds = new Set(newOrder.map(c => c.id));
const rest = chars.filter(c => !visibleIds.has(c.id));
// Interleave: heroes always visible, so just rebuild
chars = [...newOrder, ...rest.filter(c => !newOrder.find(x => x.id === c.id))];
}
});

// ─── GROUP SWITCH ───
function switchGroup(g) {
currentGroup = g;
document.querySelectorAll('.group-tab').forEach(t => t.classList.toggle('active', +t.dataset.g === g));
// Reset active to first visible
const vis = visible();
currentActiveId = vis.length ? vis[0].id : null;
render();
}

function visible() {
return chars.filter(c => c.hero || c.group === currentGroup);
}

// ─── ADD CHAR ───
function addChar() {
const n = document.getElementById('in-name').value.trim();
if (!n) return;
const ini = parseInt(document.getElementById('in-ini').value) || 0;
const hero = document.getElementById('in-hero').checked;
const newChar = {
id: idCounter++,
name: n, ini, hero,
group: currentGroup,
effects: [],
done: false,
waiting: false
};
chars.push(newChar);
chars.sort((a, b) => b.ini - a.ini);
if (currentActiveId === null) currentActiveId = newChar.id;
document.getElementById('in-name').value = '';
document.getElementById('in-ini').value = '';
document.getElementById('in-name').focus();
render();
}

// ─── ADD EFFECT ───
function addEffect() {
const name = document.getElementById('eff-name').value.trim();
if (!name) return;
const targetVal = document.getElementById('eff-target').value;
if (!targetVal) return;
const targetId = parseInt(targetVal);
const target = chars.find(c => c.id === targetId);
if (!target) return;
const dur = parseInt(document.getElementById('eff-dur').value) || 1;
const n = name.toLowerCase();
let color = 'red';
if (['segen','hast','gesegnet','heilung'].some(k => n.includes(k))) color = 'green';
else if (['magie','zauber'].some(k => n.includes(k))) color = 'blue';
// skipFirstTick: don't reduce on the caster's CURRENT turn end, only next time
target.effects.push({ id: idCounter++, name, dur, color, ownerId: currentActiveId, skipFirstTick: true });
document.getElementById('eff-name').value = '';
document.getElementById('eff-dur').value = '';
render();
}

// ─── REMOVE CHAR ───
function removeChar(id) {
chars = chars.filter(c => c.id !== id);
if (currentActiveId === id) {
const vis = visible();
currentActiveId = vis.length ? vis[0].id : null;
}
render();
}

// ─── DAMAGE OVERLAY ───
function showDmg(id) {
document.querySelectorAll('.dmg-overlay').forEach(o => o.classList.remove('show'));
const el = document.getElementById('dmg-' + id);
if (el) {
el.classList.add('show');
el.querySelector('.dmg-inp').focus();
}
}

function applyDmg(id, heal) {
const c = chars.find(x => x.id === id);
const inp = document.getElementById('dmg-' + id).querySelector('.dmg-inp');
const val = parseInt(inp.value) || 0;
if (c.hp !== null) {
c.hp = heal ? Math.min(c.maxHp, c.hp + val) : Math.max(0, c.hp - val);
}
closeDmg(id);
render();
}

function closeDmg(id) {
const el = document.getElementById('dmg-' + id);
if (el) el.classList.remove('show');
}

// ─── REMOVE EFFECT ───
function removeEffect(charId, effId) {
const c = chars.find(x => x.id === charId);
if (c) c.effects = c.effects.filter(e => e.id !== effId);
render();
}

// ─── TURN LOGIC ───
function finishTurn() {
const current = chars.find(c => c.id === currentActiveId);
if (current) { current.done = true; current.waiting = false; }
// Tick down effects that were cast by this char (skip first tick)
chars.forEach(c => {
c.effects = c.effects
.map(e => {
if (e.ownerId !== currentActiveId) return e;
if (e.skipFirstTick) return { ...e, skipFirstTick: false };
return { ...e, dur: e.dur - 1 };
})
.filter(e => e.dur > 0);
});
moveToNext();
}

function waitTurn() {
const current = chars.find(c => c.id === currentActiveId);
if (current) current.waiting = true;
// Move to next WITHOUT marking done
const vis = visible();
if (!vis.length) return;
const idx = vis.findIndex(c => c.id === currentActiveId);
let next = null;
for (let i = 1; i <= vis.length; i++) {
const c = vis[(idx + i) % vis.length];
if (!c.done && !c.waiting) { next = c; break; }
}
// If no non-waiting found, allow waiting chars to go
if (!next) {
for (let i = 1; i <= vis.length; i++) {
const c = vis[(idx + i) % vis.length];
if (!c.done) { next = c; break; }
}
}
if (next) currentActiveId = next.id;
render();
}

function moveToNext() {
const vis = visible();
if (!vis.length) return;
const idx = vis.findIndex(c => c.id === currentActiveId);
let next = null;
for (let i = 1; i <= vis.length; i++) {
const c = vis[(idx + i) % vis.length];
if (!c.done) { next = c; break; }
}
if (next) {
currentActiveId = next.id;
} else {
showRoundEnd();
}
render();
}

// ─── ROUND ───
function showRoundEnd() {
document.getElementById('round-summary').textContent = 'Alle Charaktere haben ihren Zug abgeschlossen.';
document.getElementById('round-end').classList.add('show');
}

function activateChar(id) {
const c = chars.find(x => x.id === id);
if (!c || !c.waiting) return;
c.waiting = false;

// Reorder within the visible list:
// place c directly after the last done char (i.e. after whoever just finished)
const vis = visible();
const fromIdx = vis.indexOf(c);
vis.splice(fromIdx, 1);

// Find the last done char in the visible list
let insertAfter = -1;
for (let i = vis.length - 1; i >= 0; i--) {
if (vis[i].done) { insertAfter = i; break; }
}
vis.splice(insertAfter + 1, 0, c);

// Rebuild chars by replacing visible slots in-order
const visIds = new Set(vis.map(v => v.id));
let vi = 0;
chars = chars.map(x => visIds.has(x.id) ? vis[vi++] : x);

currentActiveId = id;
render();
}

function nextRound() {
roundNumber++;
document.getElementById('round-num').textContent = roundNumber;
chars.forEach(c => { c.done = false; c.waiting = false; });
const vis = visible();
currentActiveId = vis.length ? vis[0].id : null;
document.getElementById('round-end').classList.remove('show');
render();
}

function confirmReset() {
if (confirm('Neue Runde starten?')) nextRound();
}

// ─── END COMBAT ───
function confirmEndCombat() {
if (confirm('Kampf beenden? Alle Feinde werden entfernt, Helden behalten ihre Einträge.')) {
chars = chars.filter(c => c.hero);
chars.forEach(c => { c.done = false; c.waiting = false; c.effects = []; c.ini = 0; });
currentActiveId = null;
roundNumber = 1;
document.getElementById('round-num').textContent = '1';
render();
}
}

// ─── UPDATE EFFECT TARGET DROPDOWN ───
function updateEffectTargets() {
const sel = document.getElementById('eff-target');
const vis = visible();
sel.innerHTML = '<option value="">– Ziel wählen –</option>' +
vis.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

// ─── RENDER ───
function render() {
const list = document.getElementById('char-list');
list.innerHTML = '';
const vis = visible();

vis.forEach(c => {
const row = document.createElement('div');
row.className = `char-row${c.id === currentActiveId ? ' active' : ''}${c.done ? ' done' : ''}${c.waiting && !c.done ? ' waiting' : ''}`;
row.dataset.id = c.id;

// Effects
const effHtml = c.effects.map(e => `
<span class="chip chip-${e.color}" onclick="removeEffect(${c.id},${e.id})" title="Klicken zum Entfernen">
${e.name} (${e.dur})
</span>`).join('');

const waitBadge = c.waiting && !c.done ? '<span class="badge-wait">WARTET – Tippen zum Einsteigen</span>' : '';

row.innerHTML = `
<div class="side-bar ${c.hero ? 'hero' : 'enemy'}"></div>
<div class="ini-block">${c.ini}</div>
<div class="char-body">
<div class="char-name-row">
<span class="char-name">${c.name}</span>${waitBadge}
</div>
${effHtml ? `<div class="chips-row">${effHtml}</div>` : ''}
</div>
<div class="char-actions">
<button class="char-btn del" onclick="removeChar(${c.id})">✕</button>
</div>
<div class="dmg-overlay" id="dmg-${c.id}">
<input class="dmg-inp" type="number" placeholder="0" min="0">
<button class="dmg-cancel" onclick="closeDmg(${c.id})">✕</button>
</div>`;

// Tap on waiting char → activate
if (c.waiting && !c.done) {
row.addEventListener('click', (e) => {
if (!e.target.closest('.char-actions')) activateChar(c.id);
});
row.style.cursor = 'pointer';
}

list.appendChild(row);
});

// Scroll active into view
const activeEl = list.querySelector('.char-row.active');
if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

updateEffectTargets();
}

// ─── KEYBOARD ───
document.getElementById('in-name').addEventListener('keydown', e => { if (e.key === 'Enter') addChar(); });

render();
</script>

</body>
</html>
