<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Initiative Tracker - Tactical</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
* { box-sizing: border-box; touch-action: none; }
body {
font-family: 'Segoe UI', sans-serif; background: #121212; color: white;
margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

.header-area { background: #e0e0e0; padding: 10px; border-bottom: 3px solid #bb86fc; color: #000; }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.group-select { width: 100px; background: #fff; border: 1px solid #999; padding: 4px; border-radius: 4px; }

.input-row { display: grid; grid-template-columns: 2fr 0.8fr 50px; gap: 5px; }
input { background: #fff; color: #000; border: 1px solid #ccc; padding: 8px; border-radius: 4px; }

#char-list { flex: 1; overflow-y: auto; padding: 10px; touch-action: auto; }

.row {
display: flex; align-items: center; background: #1e1e1e;
margin-bottom: 4px; padding: 12px; border-left: 5px solid #666; border-radius: 4px;
}
.row.hero { border-left-color: #4caf50; }
.row.enemy { border-left-color: #f44336; }
.row.active { background: #2c2c2c; border: 2px solid #bb86fc; box-shadow: 0 0 10px rgba(187,134,252,0.3); }
.row.done { opacity: 0.3; filter: grayscale(1); }
.ini { width: 30px; font-weight: bold; color: #bb86fc; }
.name-box { flex: 1; }
.chips { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.chip { font-size: 10px; padding: 2px 6px; border-radius: 10px; color: white; }
.chip-green { background: #2e7d32; }
.chip-red { background: #c62828; }

.footer-area { background: #000; padding: 10px; border-top: 2px solid #333; }
.nav-grid { display: grid; grid-template-columns: 1.5fr 1fr 0.5fr; gap: 8px; }
.btn { border: none; font-weight: bold; border-radius: 4px; cursor: pointer; padding: 12px 5px; font-size: 12px; }
.btn-add { background: #bb86fc; color: black; }
.next { background: #4caf50; color: white; }
.wait { background: #2196f3; color: white; }
.reset { background: #333; color: #ff5252; font-size: 10px; }
</style>
</head>
<body>

<div class="header-area">
<div class="top-row">
<span style="font-weight: bold;">NEUER CHARAKTER</span>
<select id="group-sel" class="group-select" onchange="render()">
<option value="1">Gruppe 1</option>
<option value="2">Gruppe 2</option>
</select>
</div>
<div class="input-row">
<input type="text" id="in-name" placeholder="Name">
<input type="number" id="in-ini" placeholder="Ini">
<button class="btn btn-add" onclick="addChar()">OK</button>
</div>
<label style="font-size: 11px; margin-top: 5px; display: block; color: #444;">
<input type="checkbox" id="in-hero"> Held (bleibt in Gruppe)
</label>
</div>

<div id="char-list"></div>

<div class="footer-area">
<div style="display: grid; grid-template-columns: 2fr 1fr 50px; gap: 5px; margin-bottom: 10px;">
<input type="text" id="eff-name" placeholder="Effekt" list="eff-list" style="background: #222; color: white; border: 1px solid #444;">
<datalist id="eff-list"><option value="Segen"><option value="Hast"><option value="Gift"></datalist>
<input type="number" id="eff-dur" placeholder="Rnd" style="background: #222; color: white; border: 1px solid #444;">
<button class="btn" style="background: #03dac6;" onclick="addEffect()">+</button>
</div>
<div class="nav-grid">
<button class="btn next" onclick="finishTurn()">ZUG BEENDEN</button>
<button class="btn wait" onclick="waitTurn()">ABWARTEN</button>
<button class="btn reset" onclick="resetRound()">RESET</button>
</div>
</div>

<script>
let chars = [];
let currentActiveId = null;

const listEl = document.getElementById('char-list');
Sortable.create(listEl, {
animation: 150,
onEnd: () => {
const rows = Array.from(listEl.querySelectorAll('.row'));
chars = rows.map(row => chars.find(c => c.id == row.dataset.id));
}
});

function addChar() {
const n = document.getElementById('in-name').value;
const i = parseInt(document.getElementById('in-ini').value) || 0;
if(!n) return;
const newChar = { id: Date.now(), name: n, ini: i, hero: document.getElementById('in-hero').checked, group: document.getElementById('group-sel').value, effects: [], done: false };
chars.push(newChar);
chars.sort((a,b) => b.ini - a.ini);
if (currentActiveId === null) currentActiveId = newChar.id;
document.getElementById('in-name').value = ""
render();
}

function addEffect() {
const activeChar = chars.find(c => c.id === currentActiveId);
if(!activeChar || !document.getElementById('eff-name').value) return;
activeChar.effects.push({
id: Date.now(),
name: document.getElementById('eff-name').value,
dur: parseInt(document.getElementById('eff-dur').value) || 1,
color: document.getElementById('eff-name').value.toLowerCase().includes('segen') ? 'green' : 'red'
});
document.getElementById('eff-name').value = ""
render();
}

function finishTurn() {
const current = chars.find(c => c.id === currentActiveId);
if(current) current.done = true;
moveToNext();
}

function waitTurn() {
// Fokus einfach verschieben, ohne den aktuellen als 'done' zu markieren
moveToNext();
}

function moveToNext() {
const g = document.getElementById('group-sel').value;
const visible = chars.filter(c => !c.hero || c.group === g);
if(visible.length === 0) return;

let currentIndex = visible.findIndex(c => c.id === currentActiveId);
// Wir suchen den nächsten, der noch nicht 'done' ist, beginnend nach dem aktuellen
let next = null;
for(let i = 1; i <= visible.length; i++) {
let checkIdx = (currentIndex + i) % visible.length;
if(!visible[checkIdx].done) {
next = visible[checkIdx];
break;
}
}

if(next) {
currentActiveId = next.id;
// Effekt-Tick passiert JETZT, wenn der Charakter an die Reihe kommt
next.effects = next.effects.map(e => ({ ...e, dur: e.dur - 1 })).filter(e => e.dur > 0);
} else {
alert("Runde beendet! Bitte Reset für neue Runde.");
}
render();
}

function resetRound() {
if(confirm("Neue Runde starten?")) {
chars.forEach(c => c.done = false);
const g = document.getElementById('group-sel').value;
const visible = chars.filter(c => !c.hero || c.group === g);
if(visible.length > 0) currentActiveId = visible[0].id;
render();
}
}

function render() {
const list = document.getElementById('char-list');
const g = document.getElementById('group-sel').value;
list.innerHTML = ""
const visible = chars.filter(c => !c.hero || c.group === g);
visible.forEach((c) => {
const d = document.createElement('div');
d.className = `row ${c.hero ? 'hero' : 'enemy'} ${c.id === currentActiveId ? 'active' : ''} ${c.done ? 'done' : ''}`;
d.dataset.id = c.id;
let effHtml = c.effects.map(e => `<span class="chip ${e.color==='green'?'chip-green':'chip-red'}">${e.name} (${e.dur})</span>`).join('');
d.innerHTML = `<div class="ini">${c.ini}</div><div class="name-box"><b>${c.name}</b><div class="chips">${effHtml}</div></div><span>☰</span>`;
list.appendChild(d);
});
}
</script>
</body>
</html>
